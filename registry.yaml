- name: create-deal
  description: Create a new HubSpot deal after a successful sales call where a demo
    has been committed. Use this skill whenever the user says a call went well and
    a demo was booked, or asks to "log a deal", "create a deal from this call", "add
    to HubSpot", or "turn this into a deal". Only trigger when there's a clear signal
    that a demo or next commitment was secured — do NOT trigger for exploratory calls
    with no outcome, post-demo follow-ups, or existing deals being updated. Pulls
    notes from Granola automatically, extracts key fields, asks the user for any missing
    info, and creates the deal in HubSpot with all required fields and associations.
