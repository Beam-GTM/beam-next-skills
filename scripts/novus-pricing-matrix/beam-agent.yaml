# Novus Pricing Matrix Report Agent — Beam Enterprise Flow
# Deploys via: create_agent_complete.py --spec beam-agent.yaml
#
# Deployed: 2026-03-11 (v3 — GPTAction_EmptyTool + parentEdges + x-api-key auth)
# Agent ID: f492c22b-9fa4-41db-94ee-73403bbd8e7c
# Dashboard: https://app.enterprise.beam.ai/agent/f492c22b-9fa4-41db-94ee-73403bbd8e7c
# Previous attempts (empty graphs): ab90369a, f4dc09b4

agent:
  name: "Novus Pricing Matrix Report"
  description: >
    Daily automated report agent for Novus Management. Extracts rent increase,
    car park, and storage schedule data from Yardi SharePoint exports,
    validates and transforms records, generates a Pricing Matrix report,
    and notifies the team on Slack.
  personality: >
    Professional, precise, data-focused. Reports findings clearly with
    numbers and percentages. Flags anomalies proactively.
  restrictions: >
    Never modify source data. Never send reports externally.
    Always validate data before generating reports.
  prompts:
    - "Generate today's Pricing Matrix Report"
    - "Run the daily pricing matrix update"
    - "Pull the latest Yardi data and build the pricing matrix"

nodes:
  # ── Node 1: Extract Yardi Data ────────────────────────────────
  - id: "extract-yardi-data"
    objective: >
      Extract the three source data files from the Yardi SharePoint export folder:
      rent_increases.csv, car_park_schedule.csv, and storage_schedule.csv.
      Read each CSV file and return the raw data as structured records.
      Report the number of records found in each file.
    is_entry: true
    is_exit: false
    x: 250
    y: 150
    on_error: "STOP"
    auto_retry: true
    retry_count: 2
    retry_wait_ms: 3000
    pull_attachments: true

    tool:
      name: "SharePoint File Reader"
      function_name: "GPTAction_EmptyTool"
      description: "Reads CSV files from the Yardi SharePoint export folder"
      model: "BEDROCK_CLAUDE_SONNET_4"
      prompt: >
        Read the three Yardi export CSV files from the SharePoint folder:
        1. rent_increases.csv — contains unit_id, property, unit_number, tenant_name,
           lease_start, lease_end, current_rent_weekly, proposed_rent_weekly,
           increase_pct, increase_status, effective_date, notice_sent
        2. car_park_schedule.csv — contains bay_id, property, bay_number, bay_type,
           tenant_name, unit_id, monthly_rate, lease_start, lease_end, status
        3. storage_schedule.csv — contains storage_id, property, cage_number, size_sqm,
           tenant_name, unit_id, monthly_rate, lease_start, lease_end, status

        Return all records as structured JSON grouped by source file.

      input_params:
        - name: "folder_path"
          description: "SharePoint folder path containing Yardi CSV exports"
          type: "string"
          fill_type: "static"
          static_value: "/sites/NovusManagement/Shared Documents/Yardi Exports/Daily"
          required: true
          position: 0

        - name: "file_names"
          description: "CSV files to extract"
          type: "string"
          fill_type: "static"
          static_value: "rent_increases.csv, car_park_schedule.csv, storage_schedule.csv"
          required: true
          position: 1

      output_params:
        - name: "rent_increases"
          description: "Rent increase records from Yardi — unit details, current vs proposed rent, increase status"
          type: "object"
          is_array: true
          position: 0

        - name: "car_park_schedule"
          description: "Car park bay records — bay details, tenant assignments, monthly rates, occupancy status"
          type: "object"
          is_array: true
          position: 1

        - name: "storage_schedule"
          description: "Storage cage records — cage details, tenant assignments, monthly rates, occupancy status"
          type: "object"
          is_array: true
          position: 2

        - name: "extraction_summary"
          description: "Summary of extraction: record counts per file, any missing or malformed files"
          type: "string"
          position: 3

    edges:
      - target: "transform-validate"
        name: "Raw data extracted"

  # ── Node 2: Transform & Validate ──────────────────────────────
  - id: "transform-validate"
    objective: >
      Transform and validate the raw Yardi data into report-ready structures.

      For each property, calculate:
      - Rent increases: count by status (Approved/Pending/Declined),
        average increase %, total current vs proposed weekly rent,
        weekly and annual uplift amounts
      - Car park: total bays, occupied vs vacant, occupancy %,
        total monthly revenue from occupied bays
      - Storage: total cages, occupied vs vacant, occupancy %,
        total monthly revenue from occupied cages

      Also calculate portfolio-wide totals across all properties.

      Flag any anomalies:
      - Increase % above 10% (unusually high)
      - Lease end dates in the past (expired leases)
      - Occupied bays/cages with no monthly rate
    is_entry: false
    is_exit: false
    x: 550
    y: 150
    on_error: "STOP"

    tool:
      name: "Data Transformer"
      function_name: "GPTAction_EmptyTool"
      description: "Transforms raw CSV data into aggregated report metrics per property and portfolio-wide"
      model: "BEDROCK_CLAUDE_SONNET_4"
      prompt: >
        You are a data transformation agent for property management reporting.

        Process the three input datasets and produce structured output with:

        1. Per-property breakdown (grouped by property name):
           - Rent: unit count, approved/pending/declined counts, avg increase %,
             total current weekly, total proposed weekly, weekly uplift, annual uplift
           - Car park: total bays, occupied, vacant, occupancy %, monthly revenue
           - Storage: total cages, occupied, vacant, occupancy %, monthly revenue

        2. Portfolio totals (all properties combined):
           - Same metrics aggregated across all properties

        3. Anomalies (flag but don't block):
           - Rent increases > 10%
           - Expired leases (end date before today)
           - Occupied units with missing rates

        Return as structured JSON with keys: properties, portfolio, anomalies, validation_summary.

      input_params:
        - name: "rent_increases"
          description: "Raw rent increase records from extraction"
          type: "object"
          fill_type: "linked"
          linked_node_id: "extract-yardi-data"
          linked_param: "rent_increases"
          required: true
          position: 0

        - name: "car_park_schedule"
          description: "Raw car park records from extraction"
          type: "object"
          fill_type: "linked"
          linked_node_id: "extract-yardi-data"
          linked_param: "car_park_schedule"
          required: true
          position: 1

        - name: "storage_schedule"
          description: "Raw storage records from extraction"
          type: "object"
          fill_type: "linked"
          linked_node_id: "extract-yardi-data"
          linked_param: "storage_schedule"
          required: true
          position: 2

      output_params:
        - name: "report_data"
          description: "Transformed report data: per-property metrics and portfolio totals"
          type: "object"
          position: 0

        - name: "anomalies"
          description: "List of flagged anomalies found during validation"
          type: "object"
          is_array: true
          position: 1

        - name: "validation_summary"
          description: "Summary: total records processed, properties found, anomalies flagged"
          type: "string"
          position: 2

    edges:
      - target: "generate-report"
        name: "Data validated"

  # ── Node 3: Generate Report ───────────────────────────────────
  - id: "generate-report"
    objective: >
      Generate the Pricing Matrix Report as a formatted document.

      The report should include:
      1. Header: "Pricing Matrix Report" with today's date and Novus Management branding
      2. Portfolio KPIs: total units, approved/pending/declined counts,
         average increase %, weekly uplift, annual uplift,
         car park occupancy & revenue, storage occupancy & revenue
      3. Per-property sections, each containing:
         - Property KPI summary row
         - Rent increase table (unit, tenant, current, proposed, increase %, status, effective date, notice sent)
         - Car park schedule table (bay, type, tenant, rate, status)
         - Storage schedule table (cage, size, tenant, rate, status)
         - Occupancy and revenue footer
      4. Any anomalies flagged during validation
      5. Footer: Beam AI × Novus, report date, agent version

      Use a clean, professional layout suitable for executive review.
    is_entry: false
    is_exit: false
    x: 850
    y: 150
    on_error: "STOP"

    tool:
      name: "Report Generator"
      function_name: "GPTAction_EmptyTool"
      description: "Generates a formatted Pricing Matrix report from transformed data"
      model: "BEDROCK_CLAUDE_OPUS_4_5"
      prompt: >
        You are a report generation agent for Novus Management property reporting.

        Generate a professional Pricing Matrix Report from the provided data.
        The report should be clear, data-dense, and suitable for executive review.

        Structure:
        - Portfolio-wide KPI dashboard at the top
        - Per-property sections with detailed tables
        - Anomaly callouts if any exist
        - Clean professional formatting

        Output the report as formatted HTML that can be viewed in a browser.

      input_params:
        - name: "report_data"
          description: "Transformed report data with per-property and portfolio metrics"
          type: "object"
          fill_type: "linked"
          linked_node_id: "transform-validate"
          linked_param: "report_data"
          required: true
          position: 0

        - name: "anomalies"
          description: "Validation anomalies to include in the report"
          type: "object"
          fill_type: "linked"
          linked_node_id: "transform-validate"
          linked_param: "anomalies"
          required: true
          position: 1

      output_params:
        - name: "report_html"
          description: "Complete HTML pricing matrix report"
          type: "string"
          position: 0

        - name: "report_summary"
          description: "One-paragraph executive summary of the report contents"
          type: "string"
          position: 1

    edges:
      - target: "notify-team"
        name: "Report generated"

  # ── Node 4: Notify Team ──────────────────────────────────────
  - id: "notify-team"
    objective: >
      Send a Slack notification to the #novus-reports channel confirming
      the Pricing Matrix Report has been generated. Include key metrics
      from the portfolio summary: total units, approved/pending counts,
      weekly and annual uplift, car park and storage occupancy rates.
      If any anomalies were flagged, mention the count.
    is_entry: false
    is_exit: false
    x: 1150
    y: 150
    on_error: "CONTINUE"

    tool:
      name: "Slack Notifier"
      function_name: "GPTAction_EmptyTool"
      description: "Sends report completion notification to Slack"
      model: "BEDROCK_CLAUDE_SONNET_4"
      prompt: >
        Send a concise Slack notification about the completed Pricing Matrix Report.

        Format the message as:
        ✅ *Pricing Matrix Report — [today's date]*

        📊 *Portfolio Summary*
        • [total units] units | [approved] approved | [pending] pending
        • Weekly uplift: $[amount] | Annual: $[amount]
        • Car park: [X]% occupied | Storage: [X]% occupied

        [If anomalies: ⚠️ [N] anomalies flagged — review report for details]

        _Report generated by Beam AI agent_

      input_params:
        - name: "channel"
          description: "Slack channel to post notification"
          type: "string"
          fill_type: "static"
          static_value: "#novus-reports"
          required: true
          position: 0

        - name: "report_summary"
          description: "Executive summary from report generation"
          type: "string"
          fill_type: "linked"
          linked_node_id: "generate-report"
          linked_param: "report_summary"
          required: true
          position: 1

        - name: "anomalies"
          description: "Anomalies to mention in notification"
          type: "object"
          fill_type: "linked"
          linked_node_id: "transform-validate"
          linked_param: "anomalies"
          required: false
          position: 2

      output_params:
        - name: "notification_status"
          description: "Confirmation that Slack notification was sent"
          type: "string"
          position: 0
