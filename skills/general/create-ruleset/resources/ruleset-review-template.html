<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleset Review — {{RULESET_NAME}}</title>
    <style>
        :root {
            --pass: #16a34a;
            --fail: #dc2626;
            --amber: #d97706;
            --amber-bg: #fffbeb;
            --amber-border: #fbbf24;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-bg: #eff6ff;
            --green-bg: #f0fdf4;
            --green-border: #86efac;
            --red-bg: #fef2f2;
            --red-border: #fca5a5;
            --purple: #7c3aed;
            --purple-bg: #f5f3ff;
            --purple-border: #c4b5fd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
        }

        .header h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
        .header .meta { color: var(--text-muted); font-size: 0.9rem; }

        .section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: #f1f5f9;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
        }

        .section-header h2 { font-size: 1.1rem; }
        .section-header .badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-weight: 600;
        }

        .section-body { padding: 1.5rem; }
        .section-body.collapsed { display: none; }

        /* Use case narrative */
        .use-case-block {
            background: var(--accent-bg);
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .use-case-block:last-child { margin-bottom: 0; }
        .use-case-block p { margin-bottom: 0.5rem; font-size: 0.95rem; }
        .use-case-block p:last-child { margin-bottom: 0; }
        .use-case-block strong { color: var(--accent); }
        .use-case-block h4 { color: var(--accent); font-size: 0.9rem; margin-bottom: 0.5rem; }

        .litmus-test {
            background: var(--green-bg);
            border: 1px solid var(--green-border);
            border-left: 4px solid var(--pass);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            font-style: italic;
            font-size: 0.95rem;
        }

        .difficulty-layer {
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }
        .difficulty-layer:last-child { border-bottom: none; }
        .difficulty-layer .layer-name {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
        }
        .difficulty-layer .layer-desc { font-size: 0.9rem; color: var(--text-muted); }

        /* Tables */
        .schema-table {
            width: 100%;
            border-collapse: collapse;
        }
        .schema-table th, .schema-table td {
            padding: 0.6rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .schema-table th {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            background: #f8fafc;
        }
        .schema-table tr:hover { background: #f8fafc; }

        /* Entity cards (input schema) */
        .entity-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .entity-card:last-child { margin-bottom: 0; }
        .entity-card .entity-name {
            background: #f1f5f9;
            padding: 0.75rem 1rem;
            font-weight: 600;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border);
        }
        .entity-card .entity-body { padding: 1rem; }
        .entity-card h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 1rem 0 0.5rem 0;
        }
        .entity-card h4:first-child { margin-top: 0; }

        /* Content texture */
        .content-texture {
            background: #fefce8;
            border: 1px solid #fde68a;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 0.75rem;
            font-size: 0.9rem;
        }
        .content-texture h5 { font-size: 0.8rem; text-transform: uppercase; color: var(--amber); margin-bottom: 0.5rem; }

        /* Chips for variation dimensions */
        .dim-row {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.35rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }
        .dim-row:last-child { border-bottom: none; }
        .dim-label {
            font-weight: 600;
            font-size: 0.85rem;
            min-width: 150px;
            color: var(--text);
        }
        .chip {
            display: inline-block;
            padding: 0.2rem 0.55rem;
            background: var(--accent-bg);
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 500;
            white-space: nowrap;
        }

        /* Test Scenario cards */
        .scenario-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .scenario-card:last-child { margin-bottom: 0; }
        .scenario-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            font-weight: 600;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border);
        }
        .scenario-header .sample-count {
            font-size: 0.8rem;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-weight: 600;
        }
        .scenario-body { padding: 1rem; }
        .scenario-body h5 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin: 1rem 0 0.4rem 0;
        }
        .scenario-body h5:first-child { margin-top: 0; }
        .scenario-body p { font-size: 0.9rem; margin-bottom: 0; }

        .scenario-happy .scenario-header { background: var(--green-bg); color: var(--pass); border-bottom-color: var(--green-border); }
        .scenario-happy .sample-count { background: var(--green-bg); color: var(--pass); border: 1px solid var(--green-border); }
        .scenario-edge .scenario-header { background: var(--amber-bg); color: var(--amber); border-bottom-color: var(--amber-border); }
        .scenario-edge .sample-count { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
        .scenario-error .scenario-header { background: var(--red-bg); color: var(--fail); border-bottom-color: var(--red-border); }
        .scenario-error .sample-count { background: var(--red-bg); color: var(--fail); border: 1px solid var(--red-border); }
        .scenario-adversarial .scenario-header { background: var(--purple-bg); color: var(--purple); border-bottom-color: var(--purple-border); }
        .scenario-adversarial .sample-count { background: var(--purple-bg); color: var(--purple); border: 1px solid var(--purple-border); }

        /* Derivation steps */
        .derivation-step {
            display: flex;
            gap: 0.75rem;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
        }
        .derivation-step:last-child { border-bottom: none; }
        .step-num {
            background: var(--accent);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 0.1rem;
        }
        .step-text { font-size: 0.9rem; }
        .step-text strong { color: var(--text); }

        /* Few-shot examples */
        .example-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .example-card:last-child { margin-bottom: 0; }
        .example-header {
            background: #f1f5f9;
            padding: 0.75rem 1rem;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
        }
        .example-body { padding: 1rem; }
        .example-body pre {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            overflow-x: auto;
            margin: 0.5rem 0;
            font-family: 'SF Mono', 'Fira Code', monospace;
            white-space: pre-wrap;
        }
        .example-body .derivation-note {
            background: var(--green-bg);
            border: 1px solid var(--green-border);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        /* Anti-patterns */
        .anti-pattern {
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .anti-pattern:last-child { border-bottom: none; }
        .anti-pattern .ap-name { font-weight: 600; color: var(--fail); }
        .anti-pattern .ap-desc { color: var(--text-muted); }

        /* Open questions */
        .question-card {
            background: var(--amber-bg);
            border: 1px solid var(--amber-border);
            border-left: 4px solid var(--amber);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
        }
        .question-card:last-child { margin-bottom: 0; }
        .question-card .q-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--amber);
            margin-bottom: 0.25rem;
        }
        .question-card .q-context { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .question-card .q-question { font-size: 0.95rem; font-weight: 600; color: var(--text); }

        code {
            background: #f1f5f9;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.85em;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
        }
    </style>
    <script>
        function toggleSection(id) {
            const body = document.getElementById(id);
            body.classList.toggle('collapsed');
        }
    </script>

    <!-- GENERATION INSTRUCTIONS (remove from final output):

    Schema v2.0 — Sections and their purposes:

    1. USE CASE → 4-part narrative (Context, Inputs, Difficulty, Litmus Test)
    2. INPUT SCHEMA → Content fields + Content Texture only. NO variation/presentation chips.
    3. OUTPUT SCHEMA & DERIVATION → Fields + Quality Constraints + Derivation Procedure

       This is the SINGLE SOURCE OF TRUTH for all variation dimensions.
       Replaces old: Pairing Strategy + Per-Category Composition + Complexity & Sizing.
    5. FEW-SHOT EXAMPLES → 3-5 examples covering different scenarios
    6. ANTI-PATTERNS → Domain-specific + Generic LLM failures
    7. OPEN QUESTIONS → Only if uncertainties exist

    RULES:
    - Self-contained: no external CSS, JS, or images
    - Uncomment only the sections that have content
    - Remove these instructions from the final output
    - Planning data is a hidden YAML comment, not a visible section
    - No duplication: each dimension appears exactly once (in Test Scenarios)
